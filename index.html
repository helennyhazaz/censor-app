<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מצנזר פנים אוטומטי</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #fff;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 40px;
      text-align: center;
      font-size: 1rem;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 700px;
      backdrop-filter: blur(10px);
    }

    #drop-zone {
      border: 2px dashed rgba(255,255,255,0.3);
      border-radius: 15px;
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }

    #drop-zone:hover, #drop-zone.dragover {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.08);
    }

    #drop-zone .icon { font-size: 3rem; margin-bottom: 10px; }
    #drop-zone p { color: #ccc; font-size: 1rem; }
    #drop-zone span { color: #e94560; font-weight: bold; }

    #file-input { display: none; }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }

    label.control-label { color: #ccc; font-size: 0.9rem; }

    select, input[type=range] {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.9rem;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
    }

    .btn-primary:hover { transform: scale(1.04); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-success {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      color: #fff;
      display: none;
    }

    .btn-success:hover { transform: scale(1.04); }

    #status {
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      display: none;
    }

    #status.loading { background: rgba(52,152,219,0.2); color: #3498db; display: block; }
    #status.success { background: rgba(39,174,96,0.2); color: #2ecc71; display: block; }
    #status.error   { background: rgba(231,76,60,0.2); color: #e74c3c; display: block; }

    #preview-section {
      display: none;
      margin-top: 20px;
      text-align: center;
    }

    #preview-section h3 {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #output-canvas {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .badge {
      display: inline-block;
      background: rgba(233,69,96,0.2);
      border: 1px solid #e94560;
      color: #e94560;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    footer {
      margin-top: 40px;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      text-align: center;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

  <h1>🔒 מצנזר פנים אוטומטי</h1>
  <p class="subtitle">העלה תמונה — הפנים יטושטשו אוטומטית. הכל מתבצע בדפדפן שלך, ללא שרת.</p>

  <div class="card">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">🖼️</div>
      <p>גרור תמונה לכאן או <span>לחץ לבחירה</span></p>
      <p style="font-size:0.8rem; color:#666; margin-top:6px;">תומך ב־JPG, PNG, WEBP</p>
    </div>

    <input type="file" id="file-input" accept="image/*" />

    <div class="controls">
      <label class="control-label">סגנון צנזורה:</label>
      <select id="censor-type">
        <option value="blur">טשטוש</option>
        <option value="pixel">פיקסלציה</option>
        <option value="black">ריבוע שחור</option>
      </select>

      <label class="control-label">עוצמה:</label>
      <input type="range" id="intensity" min="1" max="10" value="5" style="width:100px"/>

      <button class="btn btn-primary" id="process-btn" disabled>✨ צנזר פנים</button>
      <button class="btn btn-success" id="download-btn">⬇️ הורד תמונה</button>
    </div>

    <div id="status"></div>

    <div id="preview-section">
      <div class="badge" id="faces-badge">0 פנים זוהו</div>
      <h3>תצוגה מקדימה</h3>
      <canvas id="output-canvas"></canvas>
    </div>
  </div>

  <footer>כל העיבוד מתבצע מקומית בדפדפן שלך — התמונות אינן נשלחות לשרת</footer>

<script>
  const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const processBtn = document.getElementById('process-btn');
  const downloadBtn= document.getElementById('download-btn');
  const statusEl   = document.getElementById('status');
  const canvas     = document.getElementById('output-canvas');
  const ctx        = canvas.getContext('2d');
  const previewSec = document.getElementById('preview-section');
  const facesBadge = document.getElementById('faces-badge');

  let currentImage = null;
  let modelsLoaded = false;

  function setStatus(msg, type) {
    statusEl.innerHTML = msg;
    statusEl.className = type;
  }

  async function loadModels() {
    setStatus('<span class="spinner"></span> טוען מודלים לזיהוי פנים...', 'loading');
    try {
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      modelsLoaded = true;
      statusEl.style.display = 'none';
      if (currentImage) processBtn.disabled = false;
    } catch (e) {
      setStatus('❌ שגיאה בטעינת המודלים. בדוק חיבור לאינטרנט.', 'error');
    }
  }

  loadModels();

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadImage(fileInput.files[0]);
  });

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        currentImage = img;
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        previewSec.style.display = 'block';
        downloadBtn.style.display = 'none';
        facesBadge.textContent = 'תמונה נטענה — לחץ "צנזר פנים"';
        if (modelsLoaded) processBtn.disabled = false;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  processBtn.addEventListener('click', async () => {
    if (!currentImage) return;
    processBtn.disabled = true;
    downloadBtn.style.display = 'none';
    setStatus('<span class="spinner"></span> מזהה פנים...', 'loading');

    ctx.drawImage(currentImage, 0, 0);

    try {
      const detections = await faceapi
        .detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.35 }));

      if (detections.length === 0) {
        setStatus('⚠️ לא זוהו פנים בתמונה. נסה תמונה אחרת.', 'error');
        processBtn.disabled = false;
        return;
      }

      const type      = document.getElementById('censor-type').value;
      const intensity = parseInt(document.getElementById('intensity').value);

      detections.forEach(det => {
        const { x, y, width, height } = det.box;
        const pad = 0.2;
        const nx = Math.max(0, x - width * pad);
        const ny = Math.max(0, y - height * pad);
        const nw = Math.min(canvas.width  - nx, width  * (1 + 2 * pad));
        const nh = Math.min(canvas.height - ny, height * (1 + 2 * pad));

        if (type === 'black') {
          ctx.fillStyle = '#000';
          ctx.fillRect(nx, ny, nw, nh);
        } else if (type === 'blur') {
          applyBlur(nx, ny, nw, nh, intensity * 5);
        } else if (type === 'pixel') {
          applyPixelate(nx, ny, nw, nh, intensity * 4);
        }
      });

      facesBadge.textContent = `✅ ${detections.length} פנים צונזרו`;
      setStatus(`✅ הצלחה! ${detections.length} פנים צונזרו בהצלחה.`, 'success');
      downloadBtn.style.display = 'inline-block';
    } catch (err) {
      setStatus('❌ שגיאה בעיבוד התמונה.', 'error');
      console.error(err);
    }

    processBtn.disabled = false;
  });

  function applyBlur(x, y, w, h, amount) {
    for (let i = 0; i < 3; i++) {
      ctx.save();
      ctx.filter = `blur(${amount}px)`;
      ctx.drawImage(canvas, x, y, w, h, x, y, w, h);
      ctx.restore();
    }
  }

  function applyPixelate(x, y, w, h, pixelSize) {
    pixelSize = Math.max(4, pixelSize);
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    const offCtx = off.getContext('2d');
    offCtx.drawImage(canvas, x, y, w, h, 0, 0, w, h);
    const sw = Math.max(1, Math.floor(w / pixelSize));
    const sh = Math.max(1, Math.floor(h / pixelSize));
    offCtx.imageSmoothingEnabled = false;
    offCtx.drawImage(off, 0, 0, w, h, 0, 0, sw, sh);
    offCtx.drawImage(off, 0, 0, sw, sh, 0, 0, w, h);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0, w, h, x, y, w, h);
  }

  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'censored_image.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
</script>
</body>
</html>
